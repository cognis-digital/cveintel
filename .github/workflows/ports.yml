name: ports

# Build + test the polyglot ports of the core scoring model on GitHub runners.
# Go and Rust are NOT verified locally by the maintainer; CI is the source of
# truth for those. TypeScript is verified both locally and here.

on:
  push:
    branches: [main, master]
    paths:
      - "ports/**"
      - ".github/workflows/ports.yml"
  pull_request:
    paths:
      - "ports/**"
      - ".github/workflows/ports.yml"

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: test
        run: go test -v ./...

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: build
        run: cargo build --verbose
      - name: test
        run: cargo test --verbose

  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: test
        run: node --test --experimental-strip-types
