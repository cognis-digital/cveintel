name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q
      - name: Smoke test CLI (offline)
        run: |
          cveintel rank examples/cves.json
          cveintel kev examples/cves.json --json
      - name: Smoke test air-gap feeds (offline, no network)
        env:
          COGNIS_FEEDS_CACHE: tests/fixtures/feeds-cache
        run: |
          cveintel feeds list
          cveintel feeds get cisa-kev --offline
          cveintel rank demos/11-airgap-feeds-enrichment/scan.json --feeds --offline
